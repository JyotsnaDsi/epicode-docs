openapi: 3.1.0
info:
  title: IraVoice API
  description: "\nIraVoice is a bidirectional media server that brings together Dialer, Recorder, and BotStream modules to enable seamless telephony services for both legacy CX systems and modern conversational AI applications.\n\n# Core Concepts\n\n**\U0001F310 IraVoice Cluster**: A cluster of media servers in one geographical region running IraVoice. Each cluster can be associated with one or more SIP trunks. Typically we recommend multi cluster setup for high availability.\n\n**\U0001F4E1 Trunk**: A SIP trunk configured in IraVoice that connects to a telephony provider. SIP trunk can either be from a Tier 1 carrier or a VNO. Each trunk is associated with one cluster and can be used by one or more campaigns.\n\n**\U0001F3AF Campaign**: A logical grouping of one or more trunks from potentially multiple clusters. You can allocate partial capacity and partial caller ID range of each trunk to different campaigns. When a make call request is made for a campaign, the system will pick a trunk and caller ID from that campaign based on the availibility and allotted capacity in real time.\n\n"
  version: 2.0.0
  x-logo:
    url: /static/epicode-logo-web.png
paths:
  /api/makecall:
    post:
      tags:
        - makecall (Make outbound call)
      summary: Make Call
      operationId: make_call_api_makecall_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeCall'
        required: true
      responses:
        '200':
          description: Call request accepted and scheduled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MakeCallResponse'
              example:
                status_code: 0
                slowdown: false
                status: OK
                call_uuid: 123e4567-e89b-12d3-a456-426614174000
                cluster: cluster1
        '400':
          description: Bad request due to invalid token
          content:
            application/json:
              example:
                status_code: 1
                status: Invalid token
        '403':
          description: >-
            Forbidden due to campaign not allowed in current hours or cluster
            down
          content:
            application/json:
              example:
                status_code: 3
                status: >-
                  This campaign is not allowed outside of production hours
                  0900-1900
        '404':
          description: Not found due to unknown campaign or cluster
          content:
            application/json:
              example:
                status_code: 1
                status: Unknown campaign
        '409':
          description: Conflict due to no trunks assigned to the campaign
          content:
            application/json:
              example:
                status_code: 1
                status: No trunks assigned to this campaign
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal server error with exception details
          content:
            application/json:
              example:
                status_code: 1
                status: 'ExceptionName : Exception message'
        '503':
          description: >-
            Service unavailable due to all clusters for the campaign being
            unreachable
          content:
            application/json:
              example:
                status_code: 2
                status: All clusters for campaign are unreachable!
      security:
        - HTTPBearer: []
