        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    MakeCall:
      properties:
        campaign_name:
          type: string
          title: ''
          description: >-
            The unique campaign name created either through API or through the
            monitor portal.
        from_number:
          type: string
          title: ''
          description: Caller ID Number.
          default: ''
        to_number:
          type: string
          title: ''
          description: Destination phone number.
        call_params:
          additionalProperties: true
          type: object
          title: ''
          description: >-
            Any valid json object. If websocket_host, websocket_port, and
            websocket_app are set, the media will be streamed to the websocket
            server.
          default:
            disable_recording: false
            stream_on_cpa_events:
              - LV
            drop_on_cpa_events:
              - FX
              - AM
            stream_frame_size_ms: 200
            bot_inactivity_limit: 0
        channel_vars:
          additionalProperties: true
          type: object
          title: ''
          description: >-
            List of channel variables including SIP headers. Variables with
            prefix sip_h_X- will set the SIP headers
          default: {}
        cpa_config:
          type: string
          title: ''
          description: >-
            If call progress analysis is required to detect answering machines,
            specify the previously configured cpa config name
          default: ''
        dial_timeout:
          type: integer
          title: ''
          description: >-
            Timeout for the dialing. If the call is not answered within this
            time limit, the call will be dropped.
          default: 30
      type: object
      required:
        - campaign_name
        - to_number
      title: MakeCall
    MakeCallDirect:
      properties:
        cluster:
          type: string
          title: ''
          description: Unique ID of the IraVoice cluster
        campaign_name:
          type: string
          title: ''
          description: >-
            The unique campaign name created either through API or through the
            monitor portal.
        from_number:
          type: string
          title: ''
          description: Caller ID Number.
          default: ''
        to_number:
          type: string
          title: ''
          description: Destination phone number.
        call_params:
          additionalProperties: true
          type: object
          title: ''
          description: >-
            Any valid json object. If websocket_host, websocket_port, and
            websocket_app are set, the media will be streamed to the websocket
            server.
          default:
            disable_recording: false
            stream_on_cpa_events:
              - LV
            drop_on_cpa_events:
              - FX
              - AM
            stream_frame_size_ms: 200
            bot_inactivity_limit: 0
        channel_vars:
          additionalProperties: true
          type: object
          title: ''
          description: >-
            List of channel variables including SIP headers. Variables with
            prefix sip_h_X- will set the SIP headers
          default: {}
        cpa_config:
          type: string
          title: ''
          description: >-
            If call progress analysis is required to detect answering machines,
            specify the previously configured cpa config name
          default: ''
        dial_timeout:
          type: integer
          title: ''
          description: >-
            Timeout for the dialing. If the call is not answered within this
            time limit, the call will be dropped.
          default: 30
      type: object
      required:
        - cluster
        - campaign_name
        - to_number
      title: MakeCallDirect
    MakeCallResponse:
      properties:
        call_uuid:
          anyOf:
            - type: string
            - type: 'null'
          title: ''
          description: Unique identifier of the call if the request is successfully queued.
        slowdown:
          anyOf:
            - type: boolean
            - type: 'null'
          title: ''
          description: >-
            Indicates if the system has a huge queue of pending requests and the
            client should slow down the rate of API calls. If you get true in
            this field, we recommend you to stop calling make call API for 60s
            to avoid hitting the rate limits.
          default: false
        status:
          type: string
          title: ''
          description: Status of the API call.
        status_code:
          type: integer
          title: ''
          description: >-
            Status code of the API response. 0 indicates success, any non-zero
            value indicates an error.
        cluster:
          anyOf:
            - type: string
            - type: 'null'
          title: ''
          description: >-
            The cluster where the call is being processed. If a campaign is
            using trunks from multiple clusters, this field can be used to
            identify the cluster for each call.
      type: object
      required:
        - status
        - status_code
      title: MakeCallResponse
    StopStream:
      properties:
        call_uuid:
          type: string
          title: Call Uuid
      type: object
      required:
        - call_uuid
      title: StopStream
    TransferCall:
      properties:
        call_uuid:
          type: string
          title: Call Uuid
        destination:
          type: string
          title: Destination
        deflect:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Deflect
          default: false
      type: object
      required:
        - call_uuid
        - destination
      title: TransferCall
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
tags:
  - name: makecall (Make outbound call)
    description: >+

      IraVoice selects an available IraVoice cluster based on configured
      capacity allocation and queues the call request in that cluster.


      The `call_params` object in the request payload controls CPA behavior,
      media streaming, webhook delivery, inactivity handling, and recording.


      # Call Params


      ## Example


      ```json

      {
          "stream_on_cpa_events": ["LV"],
          "drop_on_cpa_events": ["AM", "FX"],

          "websocket_host": "bot.example.com",
          "websocket_port": 8443,
          "websocket_app": "voicebot",

          "streaming_useraudio": true,
          "stream_frame_size_ms": 200,

          "stt_sampling_rate": 16000,
          "tts_sampling_rate": 16000,

          "bot_inactivity_limit": 30,

          "event_url": "https://events.example.com/calls",

          "disable_recording": false
      }

      ```


      ## Call Progress Analysis (CPA)


      Applicable only for outbound calls when `cpa_config` is included in the
      makecall request.


      IraCPA analyzes the initial call audio to classify the answer type and
      detect machine-generated responses, tones, silence, and screening
      behavior.


      The first CPA event is typically detected within the first 1.75 seconds of
      answered audio.


      ### Primary CPA Events


      | Code  | Meaning                                          |

      | ----- | ------------------------------------------------ |

      | `LV`  | Live human                                       |

      | `AM`  | Answering machine                                |

      | `FX`  | Fax machine                                      |

      | `SIT` | Special Information Tones                        |

      | `IBP` | Immediate beep detected immediately after answer |


      Depending on the configured CPA `break_event` behavior, analysis may
      continue after the initial classification to detect additional events.


      ### Extended CPA Events


      | Code  | Meaning                                                        
      |

      | ----- | ---------------------------------------------------------------
      |

      | `SL`  | Silence                                                        
      |

      | `BP`  | Beep detected after initial answer classification              
      |

      | `EAM` | Extended Answering Machine detection after ringtone progression
      |

      | `CS`  | Call screening detected                                        
      |


      Automatic actions can be triggered using:


      * `stream_on_cpa_events`

      * `drop_on_cpa_events`


      To learn more about IraCPA, click [here](https://epicode.in/iracpa/)



      | Parameter              | Type            |
      Description                                                                                                    
      |

      | ---------------------- | --------------- |
      ---------------------------------------------------------------------------------------------------------------
      |

      | <nobr>`stream_on_cpa_events`</nobr> | <nobr>`array<string>`</nobr> |
      Starts WebSocket media streaming when the detected CPA event matches any
      configured value.<br>Default: `["LV"]` |

      | <nobr>`drop_on_cpa_events`</nobr>   | <nobr>`array<string>`</nobr> |
      Terminates the call when the detected CPA event matches any configured
      value.<br>Default: `["FX", "AM"]`        |


      ## WebSocket Streaming


      Streams bidirectional audio between IraVoice and the configured WebSocket
      endpoint.


      * Audio from the call is streamed to the WebSocket server.

      * Audio received from the WebSocket server is injected into the live call.


      The WebSocket message format is documented in the [WebSocket Message
      Model](#tag/WebSocket-Message-Model) section.


      | Parameter              | Type      |
      Description                                                                                                                                                
      |

      | ---------------------- | --------- |
      -----------------------------------------------------------------------------------------------------------------------------------------------------------
      |

      | <nobr>`websocket_host`</nobr>       | <nobr>`string`</nobr>  | Hostname
      of the WebSocket server.<br>Requires `websocket_port` and
      `websocket_app`.                                                                        
      |

      | <nobr>`websocket_port`</nobr>       | <nobr>`integer`</nobr> | WebSocket
      server port.<br>Used only when `websocket_host` is
      configured.                                                                                   
      |

      | <nobr>`websocket_app`</nobr>        | <nobr>`string`</nobr>  | Path
      component.                                                                                                   
      |

      | <nobr>`streaming_useraudio`</nobr>  | <nobr>`boolean`</nobr> | Controls
      upstream audio delivery mode.<br>`true` → streams audio
      continuously.<br>`false` → buffers audio till speech ends and sends it as
      a WAV file. |

      | <nobr>`stream_frame_size_ms`</nobr> | <nobr>`integer`</nobr> | Duration
      of each audio chunk in milliseconds.<br>Default: `200`<br>Minimum:
      `20`<br>Chunking is time-based, not RTP packet-based.                  |

      | <nobr>`stt_sampling_rate`</nobr>    | <nobr>`integer`</nobr> | Sampling
      rate (Hz) for audio streamed<br>IraVoice → AI orchestration
      layer.<br>Range:
      `8000-48000`                                                   |

      | <nobr>`tts_sampling_rate`</nobr>    | <nobr>`integer`</nobr> | Sampling
      rate (Hz) for audio streamed<br>AI orchestration layer →
      IraVoice.<br>Range:
      `8000-48000`                                                   |


      ### Example WebSocket endpoint construction


      |
      Input                                                                                      
      | Result                                |

      |
      -------------------------------------------------------------------------------------------
      | ------------------------------------- |

      | `websocket_host = bot.example.com`<br>`websocket_port =
      8443`<br>`websocket_app = voicebot` |
      `wss://bot.example.com:8443/voicebot` |


      ## Bot Inactivity Handling


      Terminates the call if no audio is received from the WebSocket server for
      a continuous duration defined by `bot_inactivity_limit`.


      Disabled when:


      * `bot_inactivity_limit` is omitted, or

      * `bot_inactivity_limit = 0`


      | Parameter              | Type      |
      Description                                                                                          
      |

      | ---------------------- | --------- |
      -----------------------------------------------------------------------------------------------------
      |

      | <nobr>`bot_inactivity_limit`</nobr> | <nobr>`integer`</nobr> | Maximum
      allowed inactivity duration in seconds before the call is
      dropped.<br>Default: `0` (disabled) |


      ## Webhooks & Events


      | Parameter   | Type     |
      Description                                                                                                                                                                                                  
      |

      | ----------- | -------- |
      -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
      |

      | <nobr>`event_url`</nobr> | <nobr>`string`</nobr> | HTTP webhook endpoint
      that receives call lifecycle events via POST.<br>Events include `started`,
      `ringing`, `answered`, `hangup`, and related state transitions.<br>If
      configured, events are always emitted. |


      ## Recording


      | Parameter           | Type      |
      Description                                                                         
      |

      | ------------------- | --------- |
      ------------------------------------------------------------------------------------
      |

      | <nobr>`disable_recording`</nobr> | <nobr>`boolean`</nobr> | Disables
      call recording when set to `true`.<br>Default: `false` (recording
      enabled). |


      # Critical Constraints


      | Topic              |
      Details                                                                                                                                  
      |

      | ------------------ |
      -----------------------------------------------------------------------------------------------------------------------------------------
      |

      | <nobr>`Transport Security`</nobr> | Only `wss://` endpoints are
      supported.<br>`ws://` connections are rejected.<br>The WebSocket server
      must present a valid SSL certificate. |

      | <nobr>`WebSocket Protocol`</nobr> | Refer to the [WebSocket Message
      Model](#tag/WebSocket-Message-Model) section for the complete message
      schema.                                                         |

      | <nobr>`Webhook Payload`</nobr>    | Refer to the [Webhook Event URL
      Payload](#tag/Webhook-Event-URL-Payload) section for webhook request
      structure.                                                         |


      # API Response Format


      All API responses are returned in JSON format.


      | Field         | Type      |
      Description                                                                                                    
      |

      | ------------- | --------- |
      ---------------------------------------------------------------------------------------------------------------
      |

      | `call_uuid`   | `string`  | Unique identifier assigned to the queued
      call request.<br>Present only when the request is accepted successfully. 
      |

      | `slowdown`    | `boolean` | Indicates queue saturation.<br>If `true`,
      pause makecall requests for 60 seconds before retrying. |

      | `status`      | `string`  | API result message.<br>`"OK"` indicates
      success.<br>Any other value represents an error condition.                
      |

      | `status_code` | `integer` | Numeric API status code.<br>`0` indicates
      success.<br>Non-zero values indicate errors.                             |

      | `cluster`     | `string`  | Unique identifier of the IraVoice cluster
      handling the call.                                                    |


      ---

  - name: WebSocket Message Model
    description: >+

      The WebSocket connection carries both **TEXT** and **BINARY** frames:


      * **TEXT frames** → JSON-encoded control messages and events

      * **BINARY frames** → Raw audio stream (16-bit Linear PCM)


      IraVoice streams customer audio to your AI orchestration and expects bot
      audio to be streamed back on the same connection.


      ## Message Types Overview


      | Direction                   | Frame Type | Payload Type |
      Description                   |

      | --------------------------- | ---------- | ------------ |
      ----------------------------- |

      | IraVoice → AI Orchestration | TEXT       | JSON         | Call metadata,
      Call events    |

      | IraVoice → AI Orchestration | BINARY     | PCM audio    | Customer audio
      stream         |

      | AI Orchestration → IraVoice | BINARY     | PCM audio    | Bot audio
      stream              |

      | AI Orchestration → IraVoice | TEXT       | JSON         | Audio Control,
      Send DTMF      |


      ## 1. Call Metadata (Initial TEXT JSON Message)


      Immediately after connection establishment, IraVoice sends a JSON payload
      containing call metadata:


      ```json

      {
          "call_uuid": "8288ef17-3ab9-4745-b6b5-699dcdf4d7cf",
          "tenant_id": "acme",
          "call_type": "outbound",
          "to_number": "9876543210",
          "from_number": "1234567890",
          "read_sampling_rate": 8000,
          "write_sampling_rate": 8000,
          "call_params": {}
      }

      ```


      | Field                 | Type      |
      Description                                   |

      | --------------------- | --------- |
      --------------------------------------------- |

      | `call_uuid`           | string    | Unique identifier for the
      call                |

      | `tenant_id`           | string    | Tenant or account
      identifier                  |

      | `call_type`           | string    | `inbound` or
      `outbound`                       |

      | `to_number`           | string    | Destination phone
      number                      |

      | `from_number`         | string    | Source phone
      number                           |

      | `read_sampling_rate`  | integer   | Sampling rate for incoming
      audio              |

      | `write_sampling_rate` | integer   | Sampling rate for outgoing
      audio              |

      | `call_params`         | object    | Optional parameters controlling call
      behavior |



      ## 2. Call Events (TEXT JSON)


      IraVoice sends call events as JSON messages. Each event includes an
      `event` field indicating its type.

      IraVoice does DSP based VAD analysis on the server side and sends the VAD
      events. **speech** event is sent when the user starts speaking and
      **silent** event is sent when the user stops speaking.


      | Event Name    | Description                   |

      | ------------- | ----------------------------- |

      | `speech`      | User speech detected          |

      | `silence`     | Silence detected              |

      | `play_paused` | Bot audio playback paused     |

      | `play_stopped`| Bot audio playback stopped    |

      | `play_done`   | Bot playback completed        |

      | `dtmf`        | DTMF input received           |


      #### Example Event Payload


      ```json

      {
          "event": "speech",
          "call_uuid": "1ca28004-175a-402f-92d4-2fc25df35dc8",
          "energy": 2030,
          "tenant_id": "acme",
          "call_params": {
              "client_id": "1234",
              "streaming_useraudio": true,
              "websocket_app": "/",
              "websocket_host": "172.18.1.18",
              "websocket_port": 11005
          }
      }

      ```



      ## 3. Customer Audio Stream (BINARY Messages)


      * If `call_params.streaming_useraudio` is `true`, audio is streamed as
      **16-bit Linear PCM**. If `false`, audio is buffered and sent as a wave
      file in a single chunk when the user stops speaking (as indicated by VAD
      events).

      * Sampling rate configurable via `call_params.stt_sampling_rate`. If not
      specified, it defaults to the `read_sampling_rate` sent in the initial
      metadata message.

      * If `call_params.streaming_useraudio` is `true`, chunking is time-based
      (not fixed packet count)


      | Parameter          | Value                              |

      | ------------------ | ---------------------------------- |

      | Default chunk size | 200 ms                             |

      | 8 kHz chunk size   | 3200 bytes                         |

      | 16 kHz chunk size  | 6400 bytes                         |

      | Configurable via   | `call_params.stream_frame_size_ms` |


      #### Example


      | Frame Size (ms) | 8 kHz Bytes | 16 kHz Bytes |

      | --------------- | ----------- | ------------ |

      | 20 ms           | 320 bytes   | 640 bytes    |

      | 200 ms          | 3200 bytes  | 6400 bytes   |



      ## 4. Bot Audio Stream (BINARY Messages)


      Your AI orchestration must stream bot-generated audio back over the same
      WebSocket connection.

      You do not have to control the rate of streaming; simply send audio as it
      is generated. IraVoice will handle playback timing and buffering.


      | Requirement     | Description                                 |

      | --------------- | ------------------------------------------- |

      | Format          | 16-bit Linear PCM                           |

      | Direction       | AI Orchestration → IraVoice                          
      |

      | Sampling rate   | Must match the rate configured in
      `call_params.tts_sampling_rate` |


      #### Important


      * If your TTS output is at a different sampling rate than the call
      sampling rate, you must configure the `call_params.tts_sampling_rate` to
      match your TTS output rate. IraVoice will handle resampling to match the
      call's sampling rate.

      * Mismatched sampling rates will result in distorted playback.



      ## 5. Audio Control, Send DTMF (TEXT JSON Messages)

      Your AI orchestration sends a JSON message with the following schema to
      control the audio playback or send DTMF tones to the
      call:                                                

      ```json

      {
          "$schema": "http://json-schema.org/draft-07/schema#",
          "type": "object",
          "properties": {
              "request": {"type": "string", "enum": ["pause_play", "resume_play", "clear_play", "send_dtmf"]},
              "digits": {"type": "string", "pattern": "^[0-9*#]+$", "minLength": 1}
          },
          "required": ["request"]
      }

      ```


      Audio Control APIs (`pause_play`, `resume_play`, `clear_play`) are
      designed to manage bot speech playback dynamically in response to
      real-time user input, typically driven by Voice Activity Detection (VAD)
      events.


      #### Typical Interaction Flow


      1. **User Starts Speaking (VAD Trigger)**

          * When VAD detects that the customer has started speaking, a JSON event "speech" will be sent to your AI Orchestration.
          * If the bot is actively playing audio:

              * Call **`pause_play`** to immediately suspend the bot's playback.
              * This prevents overlap and improves conversational turn-taking.

      2. **Short Interjection (e.g., “hmm”, “yes”, “okay”)**

          * If the detected user input is classified as a short, non-interrupting interjection:

              * Call **`resume_play`** to continue playback from where it was paused.
              * No need to regenerate or resend the bot response.

      3. **New User Query / Intent Change**

          * If the user input represents a new question, intent, or a meaningful interruption:

              * Call **`clear_play`** to terminate the current playback and clear any buffered audio.
              * Process the new user input and generate a fresh response.
              * Send the new response audio for playback.

      #### Key Behavior Summary


      | Scenario                          | Action       | API Call      |

      | --------------------------------- | ------------ | ------------- |

      | User interrupts (starts speaking) | Pause audio  | `pause_play`  |

      | Short interjection                | Resume audio | `resume_play` |

      | New question / intent change      | Stop audio   | `clear_play`  |


      #### Notes

      * One `pause_play` is called, any new audio chunks received from your AI
      Orchestration will be buffered until the buffer limit of 20s is reached.
      After that IraVoice will drop the chunks received.

      * If `resume_play` is called, the playback will resume from the point it
      was paused, including any buffered audio.

      * If `clear_play` is called, the playback will stop and any buffered audio
      will be discarded. The next audio chunk received after that will be played
      immediately.

      * Classification of "short interjection" vs "new query" should be handled
      upstream (e.g., via intent classification or heuristic thresholds).


      This model ensures natural, interruption-aware conversational behavior and
      prevents the bot from talking over the user.


      ### Key Takeaways


      * Use **TEXT frames** strictly for control and events.

      * Use **BINARY frames** strictly for audio streaming.

      * Maintain strict adherence to PCM format and sampling rate.

      * Treat the WebSocket as a **bidirectional real-time audio + signaling
      channel**.


      This structure ensures predictable framing, low-latency streaming, and
      compatibility with IraVoice playback systems.


